    </text>
    <text x="0" y="188" fill="#f7f0e7" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-1.8">
      Peregrina
    </text>

    <text x="0" y="262" fill="#e2d6c6" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="600">
      Technical Program Manager / Delivery Ops / Technical Operations
    </text>

    <text x="0" y="338" fill="#e2d6c6" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="500">
      Rollouts, implementation, operational control, dashboards,
    </text>
    <text x="0" y="376" fill="#e2d6c6" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="500">
      and automation for complex execution environments.
    </text>

    <g transform="translate(0 450)">
      <rect x="0" y="0" width="238" height="48" rx="24" fill="#ff7d47"/>
      <text x="28" y="31" fill="#171f29" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
        ~9,000 devices coordinated
      </text>

      <rect x="262" y="0" width="212" height="48" rx="24" fill="#f7f0e7" fill-opacity="0.08" stroke="#f7f0e7" stroke-opacity="0.12"/>
      <text x="290" y="31" fill="#f7f0e7" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
        Control tower mindset
      </text>

      <rect x="498" y="0" width="212" height="48" rx="24" fill="#19b5aa" fill-opacity="0.18" stroke="#19b5aa" stroke-opacity="0.36"/>
      <text x="528" y="31" fill="#d8faf8" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">
        Automation + dashboards
      </text>
