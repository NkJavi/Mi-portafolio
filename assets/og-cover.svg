<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Jose Javier Perez Peregrina - TPM, Delivery and Technical Operations</title>
  <desc id="desc">Social preview cover with recruiter-first positioning for technical program management, delivery, operations, and automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#182235"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="6%" r="48%">
      <stop offset="0%" stop-color="#ff7d47" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff7d47" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="84%" cy="24%" r="42%">
      <stop offset="0%" stop-color="#19b5aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#19b5aa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#f7f0e7" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7"/>

  <circle cx="1038" cy="118" r="118" fill="#ff7d47" opacity="0.08"/>
  <circle cx="111" cy="538" r="166" fill="#19b5aa" opacity="0.08"/>

  <g transform="translate(86 84)">
    <rect x="0" y="0" width="246" height="38" rx="19" fill="#f7f0e7" fill-opacity="0.08" stroke="#f7f0e7" stroke-opacity="0.12"/>
    <text x="20" y="25" fill="#f7f0e7" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3.2">
      TPM · DELIVERY · OPS
    </text>

    <text x="0" y="118" fill="#f7f0e7" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-1.8">
